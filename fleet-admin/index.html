<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Proxy Fleet Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --font: system-ui, -apple-system, sans-serif; --mono: 'Menlo', 'Consolas', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 24px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
  .card-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  input, textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 13px; padding: 8px 12px;
    outline: none; transition: border-color .15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  input.url { flex: 2; min-width: 200px; }
  input.key { flex: 1; min-width: 140px; }
  input.name { flex: 1; min-width: 100px; }
  button {
    border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; padding: 8px 16px; transition: opacity .15s;
    white-space: nowrap;
  }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
  .btn-warn { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase;
       letter-spacing: .06em; padding: 0 12px 10px; text-align: left; }
  td { padding: 10px 12px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .name-cell { font-weight: 600; }
  .url-cell { color: var(--muted); font-family: var(--mono); font-size: 12px; max-width: 220px;
              overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ver-cell { font-family: var(--mono); font-size: 12px; }
  .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    border-radius: 99px; font-size: 11px; font-weight: 600; padding: 2px 9px;
  }
  .badge-green { background: rgba(63,185,80,.12); color: var(--green); }
  .badge-yellow { background: rgba(210,153,34,.12); color: var(--yellow); }
  .badge-red { background: rgba(248,81,73,.12); color: var(--red); }
  .badge-muted { background: rgba(125,133,144,.1); color: var(--muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .log-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    font-family: var(--mono); font-size: 12px; color: #7ee787; max-height: 260px;
    overflow-y: auto; padding: 12px 14px; white-space: pre-wrap; word-break: break-all;
    display: none; margin-top: 12px;
  }
  .log-box.visible { display: block; }
  .empty { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }

  .global-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .stats { display: flex; gap: 18px; font-size: 13px; color: var(--muted); }
  .stats span b { color: var(--text); }

  @media (max-width: 600px) {
    th:nth-child(2), td:nth-child(2) { display: none; }
  }
</style>
</head>
<body>

<h1>AI Proxy Fleet Manager</h1>
<p class="subtitle">管理多个 AI Proxy Node 节点 · 数据存储在浏览器本地</p>

<!-- Add instance -->
<div class="card">
  <div class="card-title">添加节点</div>
  <div class="row">
    <input class="name" id="inp-name" type="text" placeholder="名称（如 团队A）" />
    <input class="url"  id="inp-url"  type="text" placeholder="https://your-proxy.replit.app" />
    <input class="key"  id="inp-key"  type="password" placeholder="PROXY_API_KEY" />
    <button class="btn-primary" onclick="addInstance()">添加</button>
    <button class="btn-ghost"   onclick="importJson()">导入 JSON</button>
    <button class="btn-ghost"   onclick="exportJson()">导出 JSON</button>
  </div>
</div>

<!-- Instance table -->
<div class="card" style="padding: 0; overflow: hidden;">
  <div class="global-bar" style="padding: 14px 20px 0;">
    <div class="stats" id="stats"><span><b id="stat-total">0</b> 个节点</span></div>
    <div class="row">
      <button class="btn-ghost btn-sm" onclick="checkAll()">全部检测</button>
      <button class="btn-warn  btn-sm" onclick="updateAll()">全部更新</button>
    </div>
  </div>

  <table id="table">
    <thead>
      <tr>
        <th>名称</th>
        <th>地址</th>
        <th>当前版本</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="5" class="empty">暂无节点，请在上方添加</td></tr>
    </tbody>
  </table>
</div>

<!-- Log panel -->
<div class="card" id="log-card" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
    <div class="card-title" id="log-title" style="margin:0;">更新日志</div>
    <button class="btn-ghost btn-sm" onclick="closeLog()">关闭</button>
  </div>
  <div class="log-box visible" id="log-box"></div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const STORE_KEY = 'fleet_instances_v2';

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch { return []; }
}
function save(data) { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

// ── State ─────────────────────────────────────────────────────────────────────
let instances = load(); // [{ id, name, url, key, status, version, latestVersion, updateAvailable, lastChecked }]

function genId() { return Math.random().toString(36).slice(2, 9); }

// ── Add / Remove ──────────────────────────────────────────────────────────────
function addInstance() {
  const name = document.getElementById('inp-name').value.trim();
  const url  = document.getElementById('inp-url').value.trim().replace(/\/$/, '');
  const key  = document.getElementById('inp-key').value.trim();
  if (!url || !key) { alert('请填写地址和 API Key'); return; }
  instances.push({ id: genId(), name: name || url, url, key, status: 'unknown', version: null, latestVersion: null, updateAvailable: false, lastChecked: null });
  save(instances);
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value  = '';
  document.getElementById('inp-key').value  = '';
  render();
}

function removeInstance(id) {
  if (!confirm('确认删除该节点？')) return;
  instances = instances.filter(i => i.id !== id);
  save(instances);
  render();
}

// ── Version check ─────────────────────────────────────────────────────────────
async function checkInstance(id) {
  const inst = instances.find(i => i.id === id);
  if (!inst) return;
  inst.status = 'checking';
  render();
  try {
    const r = await fetch(`${inst.url}/api/version`, {
      headers: { 'Authorization': `Bearer ${inst.key}` },
      signal: AbortSignal.timeout(10000),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const body = await r.json();
    inst.version        = body.current?.version ?? body.version ?? '?';
    inst.latestVersion  = body.remote?.version  ?? null;
    inst.updateAvailable = body.updateAvailable ?? false;
    inst.status = 'ok';
  } catch (e) {
    inst.status = 'error';
    inst.version = null;
  }
  inst.lastChecked = Date.now();
  save(instances);
  render();
}

async function checkAll() {
  await Promise.all(instances.map(i => checkInstance(i.id)));
}

// ── Rebuild / Update ──────────────────────────────────────────────────────────
async function updateInstance(id) {
  const inst = instances.find(i => i.id === id);
  if (!inst) return;
  inst.status = 'updating';
  render();
  try {
    const r = await fetch(`${inst.url}/api/admin/rebuild`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${inst.key}` },
      signal: AbortSignal.timeout(240000),
    });
    const body = await r.json();
    showLog(inst.name, body.log ?? [], body.version);
    inst.status = body.success ? 'restart-needed' : 'error';
    if (body.version) inst.version = body.version;
  } catch (e) {
    inst.status = 'error';
    showLog(inst.name, [`错误: ${e.message}`], null);
  }
  inst.lastChecked = Date.now();
  save(instances);
  render();
}

async function updateAll() {
  const toUpdate = instances.filter(i => i.updateAvailable);
  if (toUpdate.length === 0) { alert('没有需要更新的节点（请先全部检测）'); return; }
  if (!confirm(`确认更新 ${toUpdate.length} 个节点？`)) return;
  for (const inst of toUpdate) await updateInstance(inst.id);
}

// ── Render ────────────────────────────────────────────────────────────────────
function statusBadge(inst) {
  if (inst.status === 'checking') return `<span class="badge badge-muted"><span class="dot"></span>检测中</span>`;
  if (inst.status === 'updating') return `<span class="badge badge-yellow"><span class="dot"></span>更新中</span>`;
  if (inst.status === 'restart-needed') return `<span class="badge badge-yellow"><span class="dot"></span>需要重启</span>`;
  if (inst.status === 'error')   return `<span class="badge badge-red"><span class="dot"></span>连接失败</span>`;
  if (inst.status === 'ok') {
    if (inst.updateAvailable) return `<span class="badge badge-yellow"><span class="dot"></span>有新版本 v${inst.latestVersion ?? ''}</span>`;
    return `<span class="badge badge-green"><span class="dot"></span>最新</span>`;
  }
  return `<span class="badge badge-muted"><span class="dot"></span>未检测</span>`;
}

function render() {
  const tbody = document.getElementById('tbody');
  document.getElementById('stat-total').textContent = instances.length;

  if (instances.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty">暂无节点，请在上方添加</td></tr>`;
    return;
  }

  tbody.innerHTML = instances.map(inst => {
    const isBusy = inst.status === 'checking' || inst.status === 'updating';
    const verText = inst.version ? `v${inst.version}` : '—';
    const checkedText = inst.lastChecked ? new Date(inst.lastChecked).toLocaleTimeString() : '—';
    return `
    <tr>
      <td class="name-cell">${escHtml(inst.name)}</td>
      <td class="url-cell" title="${escHtml(inst.url)}">${escHtml(inst.url)}</td>
      <td class="ver-cell">${verText}<br><small style="color:var(--muted);font-size:10px;">${checkedText}</small></td>
      <td>${statusBadge(inst)}</td>
      <td class="actions-cell">
        <button class="btn-ghost btn-sm" onclick="checkInstance('${inst.id}')" ${isBusy ? 'disabled' : ''}>检测</button>
        <button class="btn-warn btn-sm"  onclick="updateInstance('${inst.id}')" ${isBusy ? 'disabled' : ''}>更新</button>
        <button class="btn-danger btn-sm" onclick="removeInstance('${inst.id}')">删除</button>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Log panel ─────────────────────────────────────────────────────────────────
function showLog(name, lines, newVersion) {
  document.getElementById('log-card').style.display = '';
  document.getElementById('log-title').textContent = `更新日志 — ${name}${newVersion ? ` → v${newVersion}` : ''}`;
  document.getElementById('log-box').textContent = (lines || []).join('\n') || '（无日志输出）';
}
function closeLog() { document.getElementById('log-card').style.display = 'none'; }

// ── Import / Export ───────────────────────────────────────────────────────────
function exportJson() {
  const data = instances.map(({ name, url, key }) => ({ name, url, key }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fleet.json';
  a.click();
}

function importJson() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,application/json';
  input.onchange = async (e) => {
    try {
      const text = await e.target.files[0].text();
      const arr = JSON.parse(text);
      if (!Array.isArray(arr)) throw new Error('格式错误');
      let added = 0;
      for (const item of arr) {
        if (!item.url || !item.key) continue;
        if (instances.some(i => i.url === item.url)) continue;
        instances.push({ id: genId(), name: item.name || item.url, url: item.url.replace(/\/$/, ''), key: item.key, status: 'unknown', version: null, latestVersion: null, updateAvailable: false, lastChecked: null });
        added++;
      }
      save(instances);
      render();
      if (added > 0) alert(`导入成功：${added} 个节点`);
      else alert('没有新节点被导入（URL 重复或格式错误）');
    } catch (e) { alert('导入失败：' + e.message); }
  };
  input.click();
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
